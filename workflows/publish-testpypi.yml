name: Publish to TestPyPI

on:
  push:
    tags:
      - 'v*-test'  # Trigger on tags like v3.0.0-test
  workflow_dispatch:  # Allow manual trigger

jobs:
  build-and-publish:
    name: Build and publish to TestPyPI
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build twine
        
    - name: Build package
      run: python -m build
      
    - name: Check distribution
      run: twine check dist/*
      
    - name: Publish to TestPyPI
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.TEST_PYPI_API_TOKEN }}
      run: twine upload --repository testpypi dist/*
      
    - name: Wait for TestPyPI to update
      run: sleep 60
      
    - name: Test installation from TestPyPI
      run: |
        pip install --index-url https://test.pypi.org/simple/ --extra-index-url https://pypi.org/simple/ scbi-pytorch
        python -c "from scbi import SCBILinear; print('✓ TestPyPI package works!')"
        
    - name: Create comment with test instructions
      uses: actions/github-script@v6
      with:
        script: |
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: '✅ Package published to TestPyPI! Test with:\n```bash\npip install --index-url https://test.pypi.org/simple/ scbi-pytorch\n```'
          })
