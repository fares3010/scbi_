name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, develop ]
  release:
    types: [published]

jobs:
  # Run tests on all Python versions
  test:
    name: Test (Python ${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11']
        os: [ubuntu-latest, windows-latest, macos-latest]
        
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov
        
    - name: Test package import
      run: |
        pip install -e .
        python -c "from scbi import SCBILinear, SCBISequential, create_scbi_mlp"
        
    - name: Run basic functionality test
      run: |
        python -c "
        import torch
        from scbi import SCBILinear
        layer = SCBILinear(10, 5)
        X = torch.randn(100, 10)
        y = torch.randn(100, 5)
        layer.init_weights_with_proxy(X[:50], y[:50], verbose=False)
        output = layer(X)
        assert output.shape == (100, 5)
        print('✓ Functionality test passed')
        "
        
    - name: Run tests (if test directory exists)
      run: |
        if [ -d "tests" ]; then
          pytest tests/ -v --cov=scbi
        else
          echo "No tests directory found, skipping"
        fi
      shell: bash
      continue-on-error: true

  # Check code quality
  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install linting tools
      run: |
        pip install black flake8 isort
        
    - name: Check formatting with black
      run: black --check scbi.py || echo "Consider running 'black scbi.py'"
      continue-on-error: true
      
    - name: Lint with flake8
      run: flake8 scbi.py --count --select=E9,F63,F7,F82 --show-source --statistics
      continue-on-error: true
      
    - name: Check import sorting
      run: isort --check-only scbi.py || echo "Consider running 'isort scbi.py'"
      continue-on-error: true

  # Build package
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    needs: [test, lint]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install build tools
      run: |
        python -m pip install --upgrade pip
        pip install build twine
        
    - name: Build package
      run: python -m build
      
    - name: Check distribution
      run: twine check dist/*
      
    - name: Upload artifacts
      uses: actions/upload-artifact@v3
      with:
        name: dist
        path: dist/

  # Publish to TestPyPI on tags ending with -test
  publish-testpypi:
    name: Publish to TestPyPI
    needs: [build]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') && endsWith(github.ref, '-test')
    
    steps:
    - name: Download artifacts
      uses: actions/download-artifact@v3
      with:
        name: dist
        path: dist/
        
    - name: Publish to TestPyPI
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.TEST_PYPI_API_TOKEN }}
      run: |
        pip install twine
        twine upload --repository testpypi dist/*

  # Publish to PyPI on release or version tags
  publish-pypi:
    name: Publish to PyPI
    needs: [build]
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || (startsWith(github.ref, 'refs/tags/v') && !endsWith(github.ref, '-test'))
    
    steps:
    - name: Download artifacts
      uses: actions/download-artifact@v3
      with:
        name: dist
        path: dist/
        
    - name: Publish to PyPI
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
      run: |
        pip install twine
        twine upload dist/*
        
    - name: Create release notes
      if: github.event_name == 'release'
      uses: actions/github-script@v6
      with:
        script: |
          const version = context.ref.replace('refs/tags/v', '');
          const body = `
          ## 🎉 SCBI ${version} Published to PyPI!
          
          Install with:
          \`\`\`bash
          pip install scbi-pytorch==${version}
          \`\`\`
          
          Or upgrade:
          \`\`\`bash
          pip install --upgrade scbi-pytorch
          \`\`\`
          `;
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: body
          });
