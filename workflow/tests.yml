name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    name: Test on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11']
        
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt
        
    - name: Lint with flake8
      run: |
        flake8 scbi.py --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 scbi.py --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
        
    - name: Check code formatting with black
      run: black --check scbi.py
      
    - name: Run tests
      run: pytest tests/ -v --cov=scbi --cov-report=xml
      
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

  import-test:
    name: Test package import
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install package
      run: |
        python -m pip install --upgrade pip
        pip install -e .
        
    - name: Test import
      run: |
        python -c "from scbi import SCBILinear, SCBISequential, create_scbi_mlp"
        python -c "import scbi; print(f'SCBI version: {scbi.__version__}')"
        
    - name: Run quick functionality test
      run: |
        python -c "
        import torch
        from scbi import SCBILinear
        layer = SCBILinear(10, 5)
        X = torch.randn(100, 10)
        y = torch.randn(100, 5)
        layer.init_weights_with_proxy(X[:50], y[:50], verbose=False)
        output = layer(X)
        print('✓ All functionality tests passed!')
        "
